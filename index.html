<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#f8f1df">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="冰箱便签">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <title>冰箱便签</title>
  <link rel="manifest" href="./manifest.json">
  <link rel="icon" href="./assets/icons/icon-192.png" type="image/png">
  <link rel="apple-touch-icon" href="./assets/icons/icon-192.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./css/styles.css?v=20260614-enter-after-create">
</head>
<body>
  <section class="home-screen" id="homeScreen" aria-label="冰箱便签首页">
    <div class="home-fridge-wrap" id="homeFridgeWrap">
      <div class="home-mini-fridge">
        <div class="mini-logo">FRIDGE MEMO</div>
        <div class="mini-handle freezer"></div>
        <div class="mini-split"></div>
        <div class="mini-handle lower"></div>
        <div class="mini-vent"></div>
        <div class="mini-note yellow">今晚吃饭</div>
        <div class="mini-note green">买牛奶</div>
        <div class="mini-note pink">周五电话</div>
        <div class="mini-photo one">♡</div>
        <div class="mini-photo two">☕</div>
      </div>
    </div>

    <div class="home-copy">
      <p>fridge memo</p>
      <h1>冰箱便签</h1>
    </div>

    <button class="home-fridge-entry" id="homeFridgeManageButton" type="button">
      <span>我的冰箱</span>
      <small id="homeFridgeCount">0 个</small>
    </button>

    <div class="home-actions">
      <button class="home-primary" id="homeCreateButton" type="button">创建新冰箱</button>
      <button class="home-secondary" id="homeJoinButton" type="button">加入冰箱</button>
    </div>

    <div class="home-dim" id="homeDim" hidden></div>
    <section class="home-setup-sheet" id="homeSetupSheet" aria-hidden="true" hidden>
      <i class="home-sheet-handle" aria-hidden="true"></i>
      <h2 id="homeSetupTitle">加入冰箱</h2>

      <label class="home-setup-field">
        <span id="homeInviteLabel">邀请码</span>
        <input id="homeSetupCodeInput" type="text" maxlength="8" placeholder="输入邀请码">
      </label>

      <label class="home-setup-field" id="homeFridgeNameField">
        <span>冰箱名称</span>
        <input id="homeFridgeNameInput" type="text" maxlength="10" placeholder="比如：小家的冰箱">
      </label>

      <label class="home-setup-field">
        <span>你的名字</span>
        <input id="homeSetupNameInput" type="text" maxlength="8" placeholder="比如：妈妈">
      </label>

      <div class="home-setup-field">
        <span>选个颜色</span>
        <div class="home-color-grid" id="homeColorGrid">
          <button class="active" type="button" data-color="#a83232" style="--swatch:#a83232" aria-label="红色"></button>
          <button type="button" data-color="#d08b47" style="--swatch:#d08b47" aria-label="焦糖色"></button>
          <button type="button" data-color="#315e8c" style="--swatch:#315e8c" aria-label="蓝色"></button>
          <button type="button" data-color="#6f9f73" style="--swatch:#6f9f73" aria-label="绿色"></button>
          <button type="button" data-color="#9b6bb2" style="--swatch:#9b6bb2" aria-label="紫色"></button>
          <button type="button" data-color="#c9577d" style="--swatch:#c9577d" aria-label="玫瑰色"></button>
          <button type="button" data-color="#8b6d48" style="--swatch:#8b6d48" aria-label="咖啡色"></button>
          <button type="button" data-color="#2f8f74" style="--swatch:#2f8f74" aria-label="湖绿色"></button>
        </div>
      </div>

      <div class="home-setup-actions">
        <button id="homeSetupCancelButton" type="button">取消</button>
        <button id="homeSetupConfirmButton" type="button">加入</button>
      </div>
    </section>
  </section>

  <main class="app-shell">
    <header class="app-header">
      <button class="round-button" id="memberButton" type="button" aria-label="切换成员">
        <span id="memberInitial">毕</span>
      </button>
      <div class="brand">
        <p class="brand-kicker">fridge memo</p>
        <h1 id="activeFridgeTitle">冰箱便签</h1>
      </div>
      <button class="round-button" id="notificationButton" type="button" aria-label="通知">
        <span>♡</span>
        <i class="dot" id="notificationDot" hidden></i>
      </button>
    </header>

    <section class="fridge-stage" aria-label="家庭共享冰箱">
      <div class="fridge" id="fridge">
        <div class="fridge-logo">OUR FRIDGE</div>
        <div class="fridge-handle freezer"></div>
        <div class="fridge-split"></div>
        <div class="fridge-handle lower"></div>
        <div class="fridge-vent"></div>
        <div class="fridge-foot left"></div>
        <div class="fridge-foot right"></div>
        <div class="board" id="board"></div>
      </div>
    </section>

    <nav class="dock" aria-label="主要操作">
      <button class="dock-button active" id="addNoteButton" type="button">
        <span>✎</span>
        <strong>便签</strong>
      </button>
      <button class="dock-button" id="addPhotoButton" type="button">
        <span>▧</span>
        <strong>照片贴</strong>
      </button>
      <button class="dock-button" id="tidyButton" type="button">
        <span>↻</span>
        <strong>整理</strong>
      </button>
      <button class="dock-button" id="memoryButton" type="button">
        <span>♡</span>
        <strong>收藏夹</strong>
      </button>
    </nav>
  </main>

  <div class="scrim" id="scrim" hidden></div>

  <section class="bottom-sheet" id="composerSheet" aria-label="新建便签" aria-hidden="true">
    <div class="sheet-header">
      <h2 id="composerTitle">贴一张新的</h2>
      <button class="ghost-button" id="closeComposerButton" type="button" aria-label="关闭">×</button>
    </div>

    <div class="segmented" id="noteTypeGroup" role="group" aria-label="便签类型">
      <button class="segment active" type="button" data-type="message">留言</button>
      <button class="segment" type="button" data-type="shopping">清单</button>
      <button class="segment" type="button" data-type="reminder">提醒</button>
    </div>

    <label class="field composer-field">
      <span id="contentLabel">内容</span>
      <textarea id="noteTextInput" maxlength="180" placeholder="写点今天想被看见的小事..."></textarea>
      <button class="photo-upload-button" id="photoUploadButton" type="button" aria-label="添加照片" hidden>➕</button>
      <input id="photoInput" type="file" accept="image/*" hidden>
      <div class="mention-menu composer-mention-menu" id="composerMentionMenu" hidden></div>
    </label>

    <label class="field reminder-field" id="reminderField" hidden>
      <span>提醒时间</span>
      <input id="reminderInput" type="datetime-local">
    </label>

    <button class="primary-action" id="saveNoteButton" type="button">贴到冰箱</button>
  </section>

  <section class="bottom-sheet" id="memberSheet" aria-label="成员" aria-hidden="true">
    <div class="sheet-header">
      <h2>家里的人</h2>
      <button class="ghost-button" id="closeMemberButton" type="button" aria-label="关闭">×</button>
    </div>
    <div class="member-list" id="memberList"></div>
    <div class="invite-card">
      <span>邀请码</span>
      <div class="invite-code-row">
        <strong id="familyCode"></strong>
        <button class="copy-code-button" id="copyFamilyCodeButton" type="button">复制</button>
      </div>
    </div>
    <div class="invite-actions">
      <button class="secondary-action invite-link-action" id="copyInviteLinkButton" type="button">复制邀请链接</button>
      <button class="secondary-action" id="leaveFridgeButton" type="button">回到首页</button>
    </div>
  </section>

  <section class="bottom-sheet" id="fridgeManagerSheet" aria-label="我的冰箱" aria-hidden="true">
    <div class="sheet-header">
      <h2>我的冰箱</h2>
      <button class="ghost-button" id="closeFridgeManagerButton" type="button" aria-label="关闭">×</button>
    </div>
    <div class="fridge-manager-list" id="fridgeManagerList"></div>
  </section>

  <section class="bottom-sheet" id="notificationSheet" aria-label="通知中心" aria-hidden="true">
    <div class="sheet-header">
      <h2>通知</h2>
      <button class="ghost-button" id="closeNotificationButton" type="button" aria-label="关闭">×</button>
    </div>
    <div class="notification-list" id="notificationList"></div>
    <button class="secondary-action full-width" id="markAllReadButton" type="button">全部标为已读</button>
  </section>

  <section class="memory-page" id="memoryPage" aria-label="冰箱收藏夹" aria-hidden="true">
    <header class="memory-header">
      <button class="ghost-button" id="closeMemoryButton" type="button" aria-label="返回冰箱">×</button>
      <div>
        <p>family memory</p>
        <h2>冰箱收藏夹</h2>
      </div>
    </header>
    <div class="memory-book">
      <div class="memory-month-row">
        <button id="prevMemoryMonthButton" type="button">‹</button>
        <strong id="memoryMonthTitle">2026 年 6 月</strong>
        <button id="nextMemoryMonthButton" type="button">›</button>
      </div>
      <div class="memory-weekdays">
        <span>一</span><span>二</span><span>三</span><span>四</span><span>五</span><span>六</span><span>日</span>
      </div>
      <div class="memory-calendar" id="memoryCalendar"></div>
    </div>
  </section>

  <section class="memory-detail" id="memoryDetail" aria-label="纪念便签详情" aria-hidden="true">
    <article class="memory-detail-card">
      <div class="memory-detail-top">
        <button class="ghost-button" id="closeMemoryDetailButton" type="button" aria-label="返回收藏夹">‹</button>
        <div>
          <span id="memoryDetailDate">这一天</span>
          <h2>家庭小史</h2>
        </div>
      </div>
      <div class="memory-detail-list" id="memoryDetailList"></div>
    </article>
  </section>

  <section class="reader" id="reader" aria-label="便签详情" aria-hidden="true">
    <article class="reader-card">
      <div class="reader-top">
        <span id="readerLabel">便签</span>
        <button class="ghost-button" id="closeReaderButton" type="button" aria-label="关闭">×</button>
      </div>
      <div id="readerBody"></div>
      <div class="comments-panel">
        <h3>留言</h3>
        <div class="comment-list" id="commentList"></div>
        <div class="comment-box">
          <input id="commentInput" type="text" maxlength="80" placeholder="写一句回应...">
          <button id="sendCommentButton" type="button">发送</button>
        </div>
        <div class="mention-menu" id="mentionMenu" hidden></div>
      </div>
      <div class="reader-actions">
        <button class="secondary-action" id="favoriteButton" type="button">收藏</button>
        <button class="secondary-action" id="preserveButton" type="button">保鲜</button>
        <button class="danger-action" id="deleteButton" type="button">撕下来</button>
      </div>
    </article>
  </section>

  <div class="toast" id="toast"></div>

  <script src="./js/store.js?v=20260614-enter-after-create"></script>
  <script src="./js/supabase-config.js?v=20260614-enter-after-create"></script>
  <script src="./runtime-config.js?v=20260613-family-sync"></script>
  <script src="./js/cloud-sync.js?v=20260614-enter-after-create"></script>
  <script src="./js/drag.js?v=20260614-enter-after-create"></script>
  <script src="./js/render.js?v=20260614-enter-after-create"></script>
  <script src="./js/app.js?v=20260614-enter-after-create"></script>
</body>
</html>
